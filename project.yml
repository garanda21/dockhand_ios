name: DockhandMobile
options:
  bundleIdPrefix: pro.dockhand
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  useBaseInternationalization: true
packages:
  DockhandAPI:
    path: DockhandAPI
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 6.2.2
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    exactVersion: 1.10.1
targets:
  DockhandMobile:
    type: application
    platform: iOS
    sources:
      - path: DockhandMobile
      - path: dockhand_glass.icon
        buildPhase: resources
    dependencies:
      - package: DockhandAPI
      - package: Yams
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pro.dockhand.mobile
        SWIFT_VERSION: 6.0
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 2
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DockhandMobile/Info.plist
        MARKETING_VERSION: 1.0
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZED_STRING_SWIFTUI_SUPPORT: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: dockhand_glass
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
  DockhandMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DockhandMobileTests
    dependencies:
      - target: DockhandMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pro.dockhand.mobile.tests
        SWIFT_VERSION: 6.0
        SWIFT_EMIT_LOC_STRINGS: YES
        LOCALIZED_STRING_SWIFTUI_SUPPORT: YES
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DockhandMobile.app/DockhandMobile"
